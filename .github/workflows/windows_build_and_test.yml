name: Windows-2022 Build and Test on Qt 6.8+

on:
  push:
    branches:
      - master
      - dev
      - actions
  pull_request:
    branches:
      - master
      - dev
      - actions

jobs:
  build_and_test:
    runs-on: windows-2022
    strategy:
      matrix:
        qt_version: ['6.8.0']

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Setup CMake and Ninja
      uses: lukka/get-cmake@latest

    - name: Install Qt
      uses: jurplel/install-qt-action@v4
      with:
        version: ${{ matrix.qt_version }}
        arch: 'win64_msvc2022_64'

    - name: Create Build Environment
      shell: cmd
      run: |
         call "C:\Program Files\Microsoft Visual Studio\2022\Enterprise\VC\Auxiliary\Build\vcvars64.bat" && cmake -S . -B build -G Ninja -DENABLE_TESTING:BOOL=ON -DCMAKE_BUILD_TYPE=Debug

    - name: Build Project
      shell: cmd
      run: |
         call "C:\Program Files\Microsoft Visual Studio\2022\Enterprise\VC\Auxiliary\Build\vcvars64.bat" && cmake --build build

    - name: Run Tests
      run: cd build && ./tests/asyncfutureunittests
